<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sensor Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* --- 誤操作防止の強力なロック設定 --- */
    *, *::before, *::after {
      touch-action: none; /* すべての要素でブラウザの標準タッチ操作を禁止 */
    }
    
    html, body {
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none; /* iOSの長押しメニュー禁止 */
      overflow: hidden;            /* スクロールを完全に禁止 */
      
      /* --- 暗闇用カラー設定 --- */
      background-color: #000000;
      color: #ff0000;
    }
    
    body { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      font-family: sans-serif; 
    }

    /* --- 待機中UI --- */
    #setupScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.4; /* 【変更】最初のページ全体を暗くしました */
    }

    #instruction {
      margin-bottom: 40px;
      font-size: 16px;
      text-align: center;
      line-height: 1.8;
      padding: 0 20px;
      letter-spacing: 1px;
    }

    button { 
      padding: 12px 40px; 
      font-size: 20px; 
      border-radius: 4px; 
      background: transparent;
      color: #ff0000; 
      border: 1px solid #ff0000; /* 【変更】枠線を細くして主張を抑えました */
      cursor: pointer; 
      letter-spacing: 2px;
    }

    /* --- 実行中UI --- */
    #activeScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      opacity: 0.4; /* 【変更】実行中も暗く保つ */
    }

    /* 【変更】ボタンっぽさを無くし、通信中を示す「ゆっくり点滅する小さな点」にしました */
    .indicator-dot {
      width: 6px;
      height: 6px;
      background-color: #ff0000;
      border-radius: 50%;
      margin-bottom: 24px;
      animation: blink 2.5s infinite ease-in-out;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 1; }
    }

    #status { 
      font-size: 12px; 
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <div id="setupScreen">
    <div id="instruction">
      プラネタリウムの天井の<br>中心に向けて<br><br>STARTを押してください
    </div>
    <button id="startButton">START</button>
  </div>

  <div id="activeScreen">
    <div class="indicator-dot"></div>
    <div id="status">POINTER ACTIVE</div>
  </div>

  <script>
    const socket = io(); 
    const clientId = 'client_' + Math.random().toString(36).substr(2, 5); 
    
    let currentSensorData = { alpha: 0, beta: 0, gamma: 0 };
    let isSending = false;
    let wakeLock = null; 

    // --- 誤操作防止（JS側） ---
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });

    // 【追加】ダブルタップによるズームを強制的にブロックする処理
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (event) => {
      const now = (new Date()).getTime();
      // 前回のタップから300ミリ秒以内（ダブルタップ）なら標準の動作をキャンセル
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });


    // --- スリープ防止機能 ---
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (err) {
        console.error('スリープ防止エラー:', err);
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    document.getElementById('startButton').addEventListener('click', async () => {
      requestWakeLock();

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState === 'granted') {
            startSensing();
          } else {
            alert('センサーの利用が許可されませんでした。');
          }
        } catch (error) {
          console.error(error);
        }
      } else {
        startSensing();
      }
    });

    function startSensing() {
      // 画面の切り替え
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('activeScreen').style.display = 'flex';
      
      isSending = true;

      window.addEventListener('deviceorientation', (event) => {
        currentSensorData.alpha = event.alpha || 0;
        currentSensorData.beta = event.beta || 0;
        currentSensorData.gamma = event.gamma || 0;
      });

      setInterval(() => {
        if (isSending) {
          socket.emit('sensor-data', {
            id: clientId,
            alpha: currentSensorData.alpha,
            beta: currentSensorData.beta,
            gamma: currentSensorData.gamma
          });
        }
      }, 33);
    }
  </script>
</body>
</html>
