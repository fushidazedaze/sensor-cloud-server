<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sensor Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* --- 誤操作防止の強力なロック設定 --- */
    html, body {
      overscroll-behavior: none; /* 「下に引っ張って更新」を禁止 */
      touch-action: none;        /* スワイプやダブルタップなどのブラウザ標準アクションを禁止 */
      user-select: none;         /* テキスト選択を禁止 */
      -webkit-user-select: none; /* iOS Safari用のテキスト選択禁止 */
    }
    
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; background: #222; color: white;}
    button { padding: 20px 40px; font-size: 24px; border-radius: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    #status { margin-top: 20px; font-size: 18px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <button id="startButton">START</button>
  <div id="status">待機中...</div>

  <script>
    const socket = io(); 
    const clientId = 'client_' + Math.random().toString(36).substr(2, 5); 
    
    let currentSensorData = { alpha: 0, beta: 0, gamma: 0 };
    let isSending = false;
    let wakeLock = null; // スリープ防止用の変数

    // --- 誤操作防止（JS側） ---
    // 長押しメニューを禁止
    document.addEventListener('contextmenu', event => event.preventDefault());
    // スワイプによるスクロールを念押しで完全にブロック
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });

    // --- スリープ防止機能 (Wake Lock API) ---
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('スリープ防止が有効になりました');
        }
      } catch (err) {
        console.error('スリープ防止エラー:', err);
      }
    }

    // スマホの画面を一旦閉じて戻ってきた時などに、スリープ防止を再設定する
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    document.getElementById('startButton').addEventListener('click', async () => {
      // STARTボタンを押した瞬間にスリープ防止をリクエスト
      requestWakeLock();

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState === 'granted') {
            startSensing();
          } else {
            alert('センサーの利用が許可されませんでした。');
          }
        } catch (error) {
          console.error(error);
        }
      } else {
        startSensing();
      }
    });

    function startSensing() {
      document.getElementById('startButton').style.display = 'none';
      document.getElementById('status').innerHTML = '送信中... ID: ' + clientId + '<br>（画面ロック＆スリープ防止有効）';
      isSending = true;

      window.addEventListener('deviceorientation', (event) => {
        currentSensorData.alpha = event.alpha || 0;
        currentSensorData.beta = event.beta || 0;
        currentSensorData.gamma = event.gamma || 0;
      });

      setInterval(() => {
        if (isSending) {
          socket.emit('sensor-data', {
            id: clientId,
            alpha: currentSensorData.alpha,
            beta: currentSensorData.beta,
            gamma: currentSensorData.gamma
          });
        }
      }, 33);
    }
  </script>
</body>
</html>
