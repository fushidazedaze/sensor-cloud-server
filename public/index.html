<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sensor Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* --- 誤操作防止の強力なロック設定 --- */
    html, body {
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      
      /* --- 暗闇用カラー設定 --- */
      background-color: #000000; /* 真っ黒な背景 */
      color: #ff0000;            /* 天体観測アプリ風のピュアレッド */
    }
    
    body { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      font-family: sans-serif; 
    }

    /* --- 待機中UI --- */
    #instruction {
      margin-bottom: 40px;
      font-size: 18px;
      text-align: center;
      line-height: 1.8;
      padding: 0 20px;
    }

    button { 
      padding: 15px 50px; 
      font-size: 24px; 
      border-radius: 8px; 
      background: transparent;   /* 背景を透明に */
      color: #ff0000; 
      border: 2px solid #ff0000; /* 赤い線のフチドリ */
      cursor: pointer; 
      letter-spacing: 2px;
    }

    /* --- 実行中UI（最初は隠しておく） --- */
    #activeScreen {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    /* ポインター感を演出するシンプルな照準器 */
    .reticle {
      width: 50px;
      height: 50px;
      border: 1px solid #ff0000;
      border-radius: 50%;
      position: relative;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    .reticle::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 4px; height: 4px;
      background: #ff0000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    #status { 
      font-size: 14px; 
      letter-spacing: 2px;
      opacity: 0.6; /* 暗闇で眩しくないように少し透過させる */
    }
  </style>
</head>
<body>

  <div id="instruction">
    プラネタリウムの天井の中心に向けて、<br>STARTを押してください。
  </div>
  <button id="startButton">START</button>

  <div id="activeScreen">
    <div class="reticle"></div>
    <div id="status">POINTER ACTIVE</div>
  </div>

  <script>
    const socket = io(); 
    const clientId = 'client_' + Math.random().toString(36).substr(2, 5); 
    
    let currentSensorData = { alpha: 0, beta: 0, gamma: 0 };
    let isSending = false;
    let wakeLock = null; 

    // 誤操作防止（JS側）
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('touchmove', event => event.preventDefault(), { passive: false });

    // スリープ防止機能
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (err) {
        console.error('スリープ防止エラー:', err);
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    document.getElementById('startButton').addEventListener('click', async () => {
      requestWakeLock();

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState === 'granted') {
            startSensing();
          } else {
            alert('センサーの利用が許可されませんでした。');
          }
        } catch (error) {
          console.error(error);
        }
      } else {
        startSensing();
      }
    });

    function startSensing() {
      // 待機中のUIを消して、実行中のUIを表示する
      document.getElementById('instruction').style.display = 'none';
      document.getElementById('startButton').style.display = 'none';
      document.getElementById('activeScreen').style.display = 'flex';
      
      isSending = true;

      window.addEventListener('deviceorientation', (event) => {
        currentSensorData.alpha = event.alpha || 0;
        currentSensorData.beta = event.beta || 0;
        currentSensorData.gamma = event.gamma || 0;
      });

      setInterval(() => {
        if (isSending) {
          socket.emit('sensor-data', {
            id: clientId,
            alpha: currentSensorData.alpha,
            beta: currentSensorData.beta,
            gamma: currentSensorData.gamma
          });
        }
      }, 33);
    }
  </script>
</body>
</html>
